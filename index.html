<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>慈大微笑 QR 系統</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header>
            <h1>慈大微笑 QR 系統</h1>
            <p id="welcomeMsg">請先儲存帳號</p>
        </header>

        <div class="card">
            <div id="qrcode"></div>
            <p class="hint">這是你的專屬微笑 QR Code</p>
        </div>

        <div class="card" id="setupSection">
            <input id="accountInput" type="text" placeholder="GMS 帳號 (如: abc123)">
            <input id="nicknameInput" type="text" placeholder="暱稱">
            <button onclick="saveAndRegister()">儲存並產生 QR</button>
        </div>

        <div class="card">
            <button class="scan-btn" onclick="startScanner()">開啟相機掃描別人</button>
            <div id="reader"></div>
        </div>

        <p id="statusMsg"></p>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
